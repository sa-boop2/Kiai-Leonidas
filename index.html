<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="description" content="Unified Transformation Hub: Seamlessly switch between Kiai Martial Arts Tracker and Project Leonidas Transformation Hub.">
  <title>Kiai & Leonidas Transformation Hub</title>

  <!-- iOS PWA Standalone & Kiai Icon Configuration -->
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#07080a">
  <link rel="apple-touch-icon" href="Kiai_Rebuilt/icon.png">
  <link rel="icon" href="Kiai_Rebuilt/icon.png">
  
  <!-- Design System & Switcher Styles -->
  <link rel="stylesheet" href="switcher.css?v=10">
</head>
<body data-active-app="kiai">

  <!-- Ambient Atmosphere Background Orbs -->
  <div class="master-atmosphere" aria-hidden="true">
    <div class="ambient-glow glow-kiai"></div>
    <div class="ambient-glow glow-leonidas"></div>
  </div>

  <!-- Transition Visual Ripple Effect -->
  <div id="switchRipple" class="switch-ripple"></div>

  <!-- Dual Viewport Containers (3D Stage) -->
  <main class="viewports-stage">
    
    <!-- Kiai Viewport Wrapper -->
    <div id="wrapper-kiai" class="app-frame-wrapper">
      <iframe id="iframeKiai" class="app-frame" src="Kiai_Rebuilt/index.html?v=10" title="Kiai Martial Arts Tracker" allow="autoplay; clipboard-write; storage-access"></iframe>
    </div>

    <!-- Leonidas Viewport Wrapper -->
    <div id="wrapper-leonidas" class="app-frame-wrapper">
      <iframe id="iframeLeonidas" class="app-frame" src="Project Leonidas - App/index.html?v=10" title="Project Leonidas Transformation Hub" allow="autoplay; clipboard-write; storage-access"></iframe>
    </div>

  </main>

  <!-- Silent background audio to keep timers & sounds running uninterrupted on iPhone iOS -->
  <audio id="masterSleepKeeper" loop playsinline src="data:audio/wav;base64,UklGRigAAABXQVZFZm10IBIAAAABAAEARKwAAIhYAQACABAAAABkYXRhAgAAAAEA"></audio>

  <!-- Master Logic -->
  <script src="switcher.js"></script>
</body>
</html>
